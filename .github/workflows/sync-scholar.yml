name: Sync Scholar Publications

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync publications from Scholar
        env:
          SCHOLAR_PROFILE_URL: ${{ secrets.SCHOLAR_PROFILE_URL }}
        run: python scripts/sync_scholar.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/scholar-publications.json assets/scholar-metrics.json assets/site-data.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Scholar publications"
            git push
          fi
